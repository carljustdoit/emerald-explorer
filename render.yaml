services:
  - type: web
    name: emerald-explorer-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    # No buildCommand or startCommand needed for Docker; it uses the Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: FEED_PATH
        value: ../public/seattle_master_feed.json
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: CDN_BUCKET
        sync: false
      - key: TICKETMASTER_API_KEY
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
